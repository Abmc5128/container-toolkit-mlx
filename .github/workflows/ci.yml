name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  swift-build-test:
    name: Swift Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift build (debug)
        run: swift build

      - name: Verify CLI works
        run: swift run mlx-ctk --help

      - name: Verify CLI — device list (may fail on runners without Metal GPU)
        run: swift run mlx-ctk device list --json || true

      - name: Swift build (release)
        run: swift build --configuration release

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check client/

      - name: Format check
        run: ruff format --check client/
